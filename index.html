<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ketlin Vitória</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>
    <main>
        <div class="box-foto">
            <img src="./assets/img/keltin.png" alt="Foto da criadora da influenciadora Ketlin Vitória">
        </div>
        <h1>Ketlin Vitoria ✨</h1>
        <div class="box">
            <div class="info-card">
                <img src="./assets/img/logo_instagram.png" alt="Logo do Instagram">
                <a href="https://www.instagram.com/ketlin_vith" target="_blank">Instagram</a>
            </div>
            <div class="info-card">
                <img src="./assets/img/logo_tiktok.png" alt="Logo do Tiktol">
                <a href="https://www.tiktok.com/@ketlinvith" target="_blank">TikTok</a>
            </div>
            <div class="info-card">
                <img src="./assets/img/icon_sacola.png" alt="Icone de uma sacola de compras">
                <a href="https://vt.tiktok.com/ZSu2SWM5N/?page=TikTokShop" target="_blank">Minha Vitrine</a>
            </div>
            <div class="info-card">
                <img src="./assets/img/logo_lorealparis.png" alt="Logo da marca Loreal Paris Brasil">
                <a href="https://www.loreal.com/pt-br/brazil/news/grupo/lorealistar-conexao-com-creators-no-brasil/" target="_blank">Lorealistar inscrição</a>
            </div>
            <div class="info-card">
                <img src="./assets/img/logo_dfrance.png" alt="Logo da marca D France semi joias">
                <a href="https://vt.tiktok.com/ZSuDJ5gSc/?page=TikTokShop" target="_blank">D'France</a>
            </div>
        </div>
    </main>
</body>
</html>
